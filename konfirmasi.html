<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konfirmasi Armada PT. UNIFAM</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4F8;--card:#FFFFFF;--card2:#EBF0F7;
  --border:#D8E2EE;--border2:#B8C8DC;
  --text:#1A2535;--text2:#4A6180;--text3:#8AA0BA;
  --blue:#2563EB;--blue-glow:rgba(37,99,235,.10);
  --green:#16A34A;--green-dim:#15803D;--green-bg:#F0FDF4;
  --amber:#D97706;--red:#DC2626;
  --r:10px;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:30px}

.hdr{background:#0D1F3C;color:#fff;border-bottom:3px solid #17A8A8}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:-.2px}
.hdr p{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px}

.order-info{margin:16px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.oi-head{background:#1E3A5F;padding:10px 14px;font-size:11px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.8px}
.oi-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.oi-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.oi-label{font-size:12px;color:var(--text3)}
.oi-val{font-size:13px;font-weight:600;color:var(--text);text-align:right}
.oi-val.blue{color:var(--blue);font-family:monospace}

.wrap{padding:14px 16px}
.sec-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* PER-ORDER CARD */
.order-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;transition:.2s}
.order-card.checked{border-color:var(--green)}
.oc-head{padding:12px 14px;background:var(--card2);display:flex;align-items:center;gap:10px}
.oc-num{width:26px;height:26px;border-radius:7px;background:var(--blue-glow);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--blue);flex-shrink:0}
.oc-info{flex:1}
.oc-tgl{font-size:13px;font-weight:600;color:var(--text)}
.oc-tuj{font-size:12px;color:var(--text2);margin-top:1px}

.oc-toggle{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-top:1px solid var(--border)}
.oc-toggle-left{display:flex;align-items:center;gap:10px}
.oc-toggle-ico{width:32px;height:32px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s}
.order-card.checked .oc-toggle-ico{background:#DCFCE7}
.oc-toggle-text{font-size:13px;font-weight:600;color:var(--text2)}
.order-card.checked .oc-toggle-text{color:var(--green)}
.toggle-box{width:42px;height:24px;border-radius:12px;background:var(--border2);position:relative;transition:.25s;flex-shrink:0}
.order-card.checked .toggle-box{background:var(--green)}
.toggle-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.order-card.checked .toggle-knob{left:21px}

.oc-fields{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .25s ease, padding .25s ease}
.order-card.checked .oc-fields{max-height:500px;padding:4px 14px 14px}
.oc-field{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.oc-field:last-child{margin-bottom:0}
.oc-field label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.oc-field label .req{color:var(--amber)}
.oc-field input{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);transition:.15s;width:100%}
.oc-field input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px var(--blue-glow)}
.oc-field input::placeholder{color:var(--text3)}

/* TIDAK TERSEDIA */
.oc-alasan{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .25s ease, padding .25s ease}
.order-card.unavail .oc-alasan{max-height:120px;padding:4px 14px 14px}
.order-card.unavail{border-color:var(--border2)}

/* TOMBOL TIDAK TERSEDIA */
.oc-toggle-row{display:flex;gap:8px;padding:0 14px 12px}
.btn-status{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2);transition:.15s}
.btn-status.tersedia.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.btn-status.tidak.active{background:#FEF2F2;border-color:var(--red);color:var(--red)}

/* TOMBOL HARGA SESUAI / TIDAK */
.btn-harga{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2);transition:.15s}
.btn-harga.sesuai.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.btn-harga.tidak.active{background:#FEF2F2;border-color:var(--red);color:var(--red)}

/* SUBMIT */
.btn-submit{width:100%;padding:14px;background:#0D1F3C;color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;letter-spacing:-.1px;transition:.15s}
.btn-submit:hover{background:#17A8A8}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{background:var(--border2);cursor:not-allowed;color:var(--text3)}

/* PROGRESS INDICATOR */
.progress-bar{display:flex;gap:4px;margin-bottom:14px}
.progress-dot{flex:1;height:5px;border-radius:3px;background:var(--border)}
.progress-dot.done{background:var(--green)}
.progress-dot.skip{background:var(--red)}
.progress-text{font-size:11px;color:var(--text3);text-align:center;margin-bottom:14px}

/* SUCCESS */
.success{display:none;text-align:center;padding:40px 20px}
.success.show{display:block}
.success-ico{font-size:56px;margin-bottom:16px}
.success h2{font-size:20px;font-weight:700;color:#0D1F3C;margin-bottom:8px}
.success p{font-size:14px;color:var(--text2);line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;display:none;z-index:200;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.toast.show{display:block;animation:tin .2s}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* LOADER */
.loader{display:none;text-align:center;padding:14px;color:var(--text2);font-size:13px}
.loader.show{display:block}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}

.empty-msg{text-align:center;padding:30px 20px;color:var(--text3);font-size:13px}
</style>
</head>

<script>
const params  = new URLSearchParams(window.location.search);
const noOrder = decodeURIComponent(params.get('order') || '');
const eksp    = decodeURIComponent(params.get('eksp')  || '');
const GAS_URL = decodeURIComponent(params.get('gas')   || 'https://script.google.com/macros/s/AKfycbxzZReWvX5aY_7Tfxa3p5YCBQzd1GDc9xedWC5pYJTxfADpM8uCtO0eETO8oLzrZT5ZeA/exec');

// ── SUMBER DATA HARGA (publish CSV) ──
const HARGA_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWWl6xUcwoS3ym-dPPunI4XIWrZoi8VbeKDV-myqhTIdpsBGM7AgzXXWUFidZJTFjXgCyGANUR-vjf/pub?gid=591450213&single=true&output=csv';

let orderList  = []; // [{tgl, jam, tuj, tipe}]
let hargaData  = []; // [{dest, vtype, price, expedition}]

// Format angka Indonesia → number. "Rp10.150.000,00" → 10150000
function toNumber(str){
  if(str === null || str === undefined) return 0;
  let s = String(str).replace(/Rp/gi,'').replace(/\s/g,'').trim();
  if(!s) return 0;
  // buang ",00" desimal di akhir, lalu hapus titik ribuan
  s = s.replace(/,\d{1,2}$/,'').replace(/\./g,'').replace(/,/g,'');
  return parseInt(s,10) || 0;
}
function rupiah(n){ return 'Rp ' + (n||0).toLocaleString('id-ID'); }

// Parser CSV sederhana (mendukung kutip & koma di dalam sel)
function parseCSV(text){
  const rows = [];
  let cur = [], val = '', inQ = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQ){
      if(c === '"'){ if(text[i+1]==='"'){ val+='"'; i++; } else inQ=false; }
      else val += c;
    } else {
      if(c === '"') inQ = true;
      else if(c === ',') { cur.push(val); val=''; }
      else if(c === '\n'){ cur.push(val); rows.push(cur); cur=[]; val=''; }
      else if(c === '\r'){ /* skip */ }
      else val += c;
    }
  }
  if(val.length || cur.length){ cur.push(val); rows.push(cur); }
  return rows;
}

// Normalisasi teks untuk pencocokan (lowercase, rapikan spasi)
function norm(s){ return String(s||'').toLowerCase().replace(/\s+/g,' ').trim(); }

async function loadHarga(){
  try{
    const res = await fetch(HARGA_CSV);
    const txt = await res.text();
    const rows = parseCSV(txt);
    if(!rows.length) return;
    const head = rows[0].map(h => norm(h));
    const idx = (names) => head.findIndex(h => names.some(n => h.includes(n)));
    const iVtype = idx(['vehicle']);
    const iDest  = idx(['description','tujuan']); // nama kota
    const iPrice = idx(['price','harga']);
    const iExp   = idx(['expedition','ekspedisi']);
    hargaData = rows.slice(1)
      .filter(r => r.length > 1)
      .map(r => ({
        vtype: r[iVtype] || '',
        dest : r[iDest]  || '',
        price: toNumber(r[iPrice]),
        expedition: iExp >= 0 ? (r[iExp]||'') : ''
      }))
      .filter(r => r.dest && r.price > 0);
  }catch(e){
    console.warn('Gagal load harga:', e);
    hargaData = [];
  }
}

// Lookup harga: ekspedisi + tujuan (nama) + jenis kendaraan
function lookupHarga(ekspCode, tujuan, tipe){
  if(!hargaData.length) return null;
  const e = norm(ekspCode), t = norm(tujuan), v = norm(tipe);
  const destMatch = (h) => norm(h.dest) === t || norm(h.dest).includes(t) || t.includes(norm(h.dest));
  // 1) cocok ekspedisi + tujuan + tipe (paling akurat)
  let hit = hargaData.find(h => norm(h.expedition) === e && destMatch(h) && norm(h.vtype) === v);
  // 2) cocok ekspedisi + tujuan (tipe kosong / tak ketemu)
  if(!hit && !v) hit = hargaData.find(h => norm(h.expedition) === e && destMatch(h));
  // 3) tanpa ekspedisi: tujuan + tipe
  if(!hit) hit = hargaData.find(h => destMatch(h) && norm(h.vtype) === v);
  // 4) tujuan saja
  if(!hit && !v) hit = hargaData.find(h => destMatch(h));
  return hit || null;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('disp-order').textContent = noOrder || '—';
  document.getElementById('disp-eksp').textContent  = eksp    || '—';
  document.getElementById('empty-msg').style.display = 'block';

  // Muat data harga dulu (paralel, tidak memblok)
  loadHarga();

  if (GAS_URL && noOrder) {
    loadOrderJSONP();
  } else {
    document.getElementById('empty-msg').textContent = 'Data pesanan tidak ditemukan';
  }
});

function loadOrderJSONP() {
  const callbackName = 'jsonpCallback_' + Date.now();
  window[callbackName] = function(j) {
    delete window[callbackName];
    script.remove();
    document.getElementById('empty-msg').style.display = 'none';

    if (j.status === 'ok' && j.orders && j.orders.length) {
      orderList = j.orders;
      renderOrderCards();
    } else {
      document.getElementById('empty-msg').style.display = 'block';
      document.getElementById('empty-msg').textContent = 'Data pesanan tidak ditemukan';
    }
  };

  const script = document.createElement('script');
  script.src = GAS_URL
    + '?action=getorder'
    + '&no_order=' + encodeURIComponent(noOrder)
    + '&callback=' + callbackName;
  script.onerror = () => {
    delete window[callbackName];
    document.getElementById('empty-msg').textContent = 'Gagal memuat data, coba refresh';
  };
  document.body.appendChild(script);
}

          <div class="harga-confirm-row" id="harga-confirm-${i}" style="display:flex;gap:8px;margin-top:8px">
            <button type="button" class="btn-harga sesuai" id="hb-ok-${i}" onclick="setHargaStatus(${i}, true)">✓ Sesuai</button>
            <button type="button" class="btn-harga tidak" id="hb-no-${i}" onclick="setHargaStatus(${i}, false)">✕ Tidak Sesuai</button>
          </div>
          <div id="harga-manual-${i}" style="display:none;margin-top:8px">
            <label style="display:block;margin-bottom:4px">Harga Sesuai Ekspedisi <span class="req">*</span></label>
            <input type="text" id="harga-input-${i}" inputmode="numeric" placeholder="Mis: 20.000.000" oninput="formatHargaInput(${i})">
          </div>
        </div>
      </div>
      <div class="oc-alasan" id="oc-alasan-${i}">
        <div class="oc-field">
          <label>Alasan (opsional)</label>
          <input type="text" id="alasan-${i}" placeholder="Mis: armada penuh, jadwal bentrok...">
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('progress-text').style.display = 'block';
  updateProgress();
  applyHargaToCards();
  ensureHargaLoaded(8);
}

// Isi kotak harga tiap kartu berdasarkan tujuan + tipe kendaraan
function applyHargaToCards(){
  orderList.forEach((o, i) => {
    const box = document.getElementById(`harga-box-${i}`);
    if(!box) return;
    const hit = lookupHarga(o.eksp_code, o.tuj, o.tipe);
    if(hit){
      box.textContent = rupiah(hit.price);
      box.dataset.harga = hit.price;
      box.dataset.eksp  = hit.expedition || o.eksp_code || '';
    }else{
      box.textContent = 'Harga belum tersedia';
      box.style.color = 'var(--text3)';
      box.style.background = 'var(--bg)';
      box.dataset.harga = 0;
    }
  });
}

// ── HARGA: SESUAI / TIDAK SESUAI ──
// hargaStatus[i] = 'sesuai' | 'tidak' | undefined
const hargaStatus = {};

function setHargaStatus(i, sesuai){
  hargaStatus[i] = sesuai ? 'sesuai' : 'tidak';
  const okBtn = document.getElementById(`hb-ok-${i}`);
  const noBtn = document.getElementById(`hb-no-${i}`);
  const manual = document.getElementById(`harga-manual-${i}`);
  if(okBtn) okBtn.classList.toggle('active', sesuai);
  if(noBtn) noBtn.classList.toggle('active', !sesuai);
  if(manual) manual.style.display = sesuai ? 'none' : 'block';
  if(sesuai){
    const inp = document.getElementById(`harga-input-${i}`);
    if(inp) inp.value = '';
  }
}

// Format input harga manual dengan pemisah ribuan saat mengetik
function formatHargaInput(i){
  const inp = document.getElementById(`harga-input-${i}`);
  if(!inp) return;
  const angka = toNumber(inp.value);
  inp.value = angka ? angka.toLocaleString('id-ID') : '';
}

// Ambil harga final per order: manual jika 'tidak sesuai', else harga otomatis
function getHargaFinal(i){
  if(hargaStatus[i] === 'tidak'){
    const inp = document.getElementById(`harga-input-${i}`);
    return toNumber(inp ? inp.value : 0);
  }
  const box = document.getElementById(`harga-box-${i}`);
  return Number(box ? (box.dataset.harga || 0) : 0);
}

// Kalau harga belum termuat saat render, isi ulang begitu siap
function ensureHargaLoaded(retries){
  if(hargaData.length){ applyHargaToCards(); return; }
  if(retries > 0) setTimeout(() => ensureHargaLoaded(retries-1), 600);
}

// ── SET STATUS PER ORDER ──
const orderStatus = {}; // { 0: 'tersedia'|'tidak'|undefined }

function setStatus(i, tersedia) {
  orderStatus[i] = tersedia ? 'tersedia' : 'tidak';
  const card = document.getElementById(`oc-${i}`);
  card.classList.toggle('checked', tersedia);
  card.classList.toggle('unavail', !tersedia);

  const btns = card.querySelectorAll('.btn-status');
  btns[0].classList.toggle('active', tersedia);
  btns[1].classList.toggle('active', !tersedia);

  updateProgress();
}

function updateProgress() {
  const total = orderList.length;
  const answered = Object.keys(orderStatus).length;
  document.getElementById('progress-text').textContent =
    `${answered} dari ${total} pesanan sudah dikonfirmasi`;
}

// ── SUBMIT SEMUA ──
async function submitAll() {
  const total = orderList.length;
  const answered = Object.keys(orderStatus).length;

  if (answered < total) {
    return toast(`Konfirmasi semua pesanan dulu (${answered}/${total})`,'err');
  }

  // Validasi field wajib untuk yang "tersedia"
  for (let i = 0; i < total; i++) {
    if (orderStatus[i] === 'tersedia') {
      const nama  = document.getElementById(`nama-${i}`).value.trim();
      const hp    = document.getElementById(`hp-${i}`).value.trim();
      const nopol = document.getElementById(`nopol-${i}`).value.trim();
      if (!nama || !hp || !nopol) {
        return toast(`Lengkapi data sopir untuk pesanan #${i+1}`,'err');
      }
      // Validasi konfirmasi harga
      if (!hargaStatus[i]) {
        return toast(`Pilih ✓/✕ harga untuk pesanan #${i+1}`,'err');
      }
      if (hargaStatus[i] === 'tidak' && getHargaFinal(i) <= 0) {
        return toast(`Isi harga manual untuk pesanan #${i+1}`,'err');
      }
    }
  }

  document.getElementById('btn-submit').disabled = true;
  document.getElementById('loader').classList.add('show');

  try {
    // Kirim satu per satu (sequential, supaya tidak overload Apps Script)
    for (let i = 0; i < total; i++) {
      const o = orderList[i];
      const status = orderStatus[i] === 'tersedia' ? 'Tersedia' : 'Tidak Tersedia';
      const tersedia = orderStatus[i]==='tersedia';
      const data = {
        timestamp  : new Date().toLocaleString('id-ID'),
        no_order   : noOrder,
        ekspedisi  : eksp,
        kode_eksp  : o.eksp_code || '',
        tujuan     : o.tuj,
        tgl_muat   : o.tgl,
        jam_muat   : o.jam,
        nama_sopir : tersedia ? document.getElementById(`nama-${i}`).value.trim() : '',
        hp_sopir   : tersedia ? document.getElementById(`hp-${i}`).value.trim() : '',
        nopol      : tersedia ? document.getElementById(`nopol-${i}`).value.trim().toUpperCase() : '',
        no_kontener: tersedia ? (document.getElementById(`kont-${i}`)?.value?.trim()?.toUpperCase()||'') : '',
        est_tiba   : tersedia ? document.getElementById(`est-${i}`).value : '',
        etd        : tersedia ? (document.getElementById(`etd-${i}`)?.value || '') : '',
        eta        : tersedia ? (document.getElementById(`eta-${i}`)?.value || '') : '',
        harga      : tersedia ? String(getHargaFinal(i)) : '',
        harga_status: tersedia ? (hargaStatus[i]==='tidak' ? 'Tidak Sesuai (Manual)' : 'Sesuai') : '',
        alasan     : !tersedia ? document.getElementById(`alasan-${i}`).value.trim() : '',
        status     : status,
      };
      await submitJSONP(data);
    }

    document.getElementById('loader').classList.remove('show');
    document.getElementById('btn-submit').style.display = 'none';
    document.getElementById('order-cards').style.display = 'none';
    document.getElementById('progress-text').style.display = 'none';
    document.getElementById('success').classList.add('show');

    // Kirim notif WA ke semua admin
    kirimNotifAdmin();
  } catch(e) {
    document.getElementById('loader').classList.remove('show');
    document.getElementById('btn-submit').disabled = false;
    toast('Gagal menyimpan, coba lagi','err');
  }
}

function submitJSONP(data) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonpSubmit_' + Date.now() + '_' + Math.floor(Math.random()*1000);
    const timeout = setTimeout(() => {
      delete window[callbackName];
      script.remove();
      reject(new Error('timeout'));
    }, 8000);

    window[callbackName] = function(res) {
      clearTimeout(timeout);
      delete window[callbackName];
      script.remove();
      resolve(res);
    };

    const p = new URLSearchParams({
      action      : 'konfirmasi',
      no_order    : data.no_order,
      ekspedisi   : data.ekspedisi,
      kode_eksp   : data.kode_eksp || '',
      tujuan      : data.tujuan,
      tgl_muat    : data.tgl_muat,
      jam_muat    : data.jam_muat,
      nama_sopir  : data.nama_sopir,
      hp_sopir    : data.hp_sopir,
      nopol       : data.nopol,
      no_kontener : data.no_kontener || '',
      est_tiba    : data.est_tiba,
      etd         : data.etd || '',
      eta         : data.eta || '',
      harga       : data.harga || '',
      harga_status: data.harga_status || '',
      alasan      : data.alasan,
      status      : data.status,
      timestamp   : data.timestamp,
      callback    : callbackName
    });

    const script = document.createElement('script');
    script.src = GAS_URL + '?' + p.toString();
    script.onerror = () => { clearTimeout(timeout); delete window[callbackName]; reject(new Error('load error')); };
    document.body.appendChild(script);
  });
}

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  clearTimeout(t._t); t._t = setTimeout(()=>t.className='toast', 2800);
}

// ── NOTIF & APPROVAL KE ADMIN ──
function kirimNotifAdmin() {
  // Ambil daftar admin dari URL param
  const adminsParam = params.get('admins') || '6285885549707';
  const adminNos    = adminsParam.split(',').map(n => n.trim().replace(/\D/g,'')).filter(n => n.length >= 10);
  const hpEksp      = (params.get('hp_eksp') || '').replace(/\D/g,'');

  // Buat ringkasan per tujuan
  let ringkasan = '';
  orderList.forEach((o, i) => {
    const st = orderStatus[i];
    if (st === 'tersedia') {
      const nama  = document.getElementById(`nama-${i}`)?.value?.trim() || '-';
      const hp    = document.getElementById(`hp-${i}`)?.value?.trim() || '-';
      const nopol = document.getElementById(`nopol-${i}`)?.value?.trim()?.toUpperCase() || '-';
      const kont  = document.getElementById(`kont-${i}`)?.value?.trim()?.toUpperCase() || '';
      const est   = document.getElementById(`est-${i}`)?.value || '-';
      const etd   = document.getElementById(`etd-${i}`)?.value || '-';
      const eta   = document.getElementById(`eta-${i}`)?.value || '-';
      const hrg   = getHargaFinal(i);
      const hrgTxt = (hrg > 0) ? rupiah(hrg) : '-';
      const hrgLbl = hargaStatus[i]==='tidak' ? ' (manual)' : (hargaStatus[i]==='sesuai' ? ' ✓' : '');
      ringkasan += `\n✅ *${o.tuj}*\n`;
      ringkasan += `   Sopir : ${nama} (${hp})\n`;
      ringkasan += `   Nopol : ${nopol}${kont ? ' | Kont: ' + kont : ''}\n`;
      ringkasan += `   ETD   : ${etd}  |  ETA : ${eta}\n`;
      ringkasan += `   Est.  : ${est} WIB\n`;
      ringkasan += `   Harga : ${hrgTxt}${hrgLbl}\n`;
    } else {
      const alasan = document.getElementById(`alasan-${i}`)?.value?.trim() || '-';
      ringkasan += `\n❌ *${o.tuj}* — Tidak Tersedia\n`;
      ringkasan += `   Alasan: ${alasan}\n`;
    }
  });

  // Pesan approval & revisi ke ekspedisi
  const tglNow = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  const approveMsg =
`✅ *KONFIRMASI DISETUJUI*
PT. UNIFAM — ${tglNow}

No. Order : *${noOrder}*
Ekspedisi : *${eksp}*

Armada yang Anda konfirmasikan telah kami *SETUJUI*. Mohon segera persiapkan armada sesuai jadwal yang telah ditentukan.

Terima kasih atas kerjasamanya 🙏
_PT. UNIFAM - Divisi Logistik_`;

  const revisiMsg =
`⚠️ *PERLU KOORDINASI*
PT. UNIFAM — ${tglNow}

No. Order : *${noOrder}*
Ekspedisi : *${eksp}*

Mohon maaf, terdapat hal yang perlu kami koordinasikan terkait konfirmasi armada Anda. Tim kami akan segera menghubungi Anda.

Terima kasih atas pengertiannya 🙏
_PT. UNIFAM - Divisi Logistik_`;

  const linkApprove = hpEksp
    ? `https://wa.me/${hpEksp}?text=${encodeURIComponent(approveMsg)}`
    : `https://wa.me/?text=${encodeURIComponent(approveMsg)}`;

  const linkRevisi = hpEksp
    ? `https://wa.me/${hpEksp}?text=${encodeURIComponent(revisiMsg)}`
    : `https://wa.me/?text=${encodeURIComponent(revisiMsg)}`;

  // Pesan notif ke admin
  const notifMsg =
`🔔 *KONFIRMASI ARMADA MASUK*
PT. UNIFAM

📋 No. Order : *${noOrder}*
🚛 Ekspedisi : *${eksp}*
🕐 Waktu     : ${new Date().toLocaleString('id-ID')}
${ringkasan}
━━━━━━━━━━━━━━━━
Ketuk untuk kirim balasan ke ekspedisi:

✅ *SETUJUI* → ${linkApprove}

⚠️ *REVISI* → ${linkRevisi}`;

  // Kirim ke semua admin (delay antar nomor)
  if (adminNos.length === 0) {
    window.open(`https://wa.me/6285885549707?text=${encodeURIComponent(notifMsg)}`, '_blank');
    return;
  }
  adminNos.forEach((no, idx) => {
    setTimeout(() => {
      window.open(`https://wa.me/${no}?text=${encodeURIComponent(notifMsg)}`, '_blank');
    }, idx * 1000);
  });
}
