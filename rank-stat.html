<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porsi Ranking Rate — PT. UNIFAM</title>
<style>
:root{--navy:#0C447C;--navy-d:#042C53;--teal:#1D9E75;--amber:#B45309;--red:#B91C1C;--purple:#7C3AED;--ink:#0F1B2D;--muted:#5B6B7F;--line:#E2E8F0;--bg:#F4F7FB;--card:#fff;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
.wrap{max-width:1000px;margin:0 auto;padding:16px 14px 70px}
.hdr{background:linear-gradient(120deg,var(--navy-d),var(--navy));border-radius:var(--r);padding:15px 20px;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.hdr a.back{background:rgba(255,255,255,.15);color:#fff;text-decoration:none;font-size:13px;font-weight:700;padding:8px 12px;border-radius:8px;flex-shrink:0}
.hdr .ic{width:40px;height:40px;background:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:21px}
.hdr h1{font-size:17px;font-weight:800}
.hdr p{font-size:11.5px;opacity:.85}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.tabs{display:flex;gap:5px}
.tab{padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--muted);white-space:nowrap}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
select{padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit}
.btn{background:var(--navy);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card h2{font-size:14px;margin-bottom:3px}
.card .sub{font-size:11.5px;color:var(--muted);margin-bottom:14px}
.rank-row{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.rank-lbl{width:78px;flex-shrink:0;font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:5px}
.bar-wrap{flex:1;background:#EEF2F7;border-radius:20px;height:26px;overflow:hidden;position:relative}
.bar{height:100%;border-radius:20px;display:flex;align-items:center;padding:0 10px;color:#fff;font-size:11.5px;font-weight:800;min-width:2px;transition:width .4s}
.rank-num{width:96px;flex-shrink:0;text-align:right;font-size:12px}
.rank-num b{font-size:15px}
.b1{background:var(--teal)}.b2{background:#3B82F6}.b3{background:var(--amber)}.b4{background:var(--purple)}.b5{background:#94A3B8}
.stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{flex:1;min-width:110px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
.stat .n{font-size:20px;font-weight:800}
.stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
th{text-align:left;font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:800;padding:8px;border-bottom:2px solid var(--line);white-space:nowrap}
td{padding:9px 8px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
.mini{font-size:10.5px;color:var(--muted)}
.loading,.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.note{background:#FEF6E7;border:1px solid #F4D58A;border-radius:9px;padding:10px 13px;font-size:11.5px;color:#92400E;margin-bottom:14px}
.foot{text-align:center;font-size:11px;color:var(--muted);margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <a href="planning.html" class="back">← Planning</a>
    <div class="ic">🎯</div>
    <div>
      <h1>Porsi Ranking Rate</h1>
      <p>PT. UNIFAM — Berapa kali & berapa persen tiap ranking dipilih</p>
    </div>
  </div>

  <div class="toolbar">
    <div class="tabs">
      <div class="tab on" id="t-laut" onclick="pilihJenis('laut')">🚢 Laut / Kontainer</div>
      <div class="tab" id="t-darat" onclick="pilihJenis('darat')">🚛 Darat / Truck</div>
    </div>
    <select id="f-bulan" onchange="render()"><option value="">— semua bulan —</option></select>
    <button class="btn" onclick="muat()">↻ Refresh</button>
  </div>

  <div id="isi"><div class="loading">Menghitung porsi ranking…</div></div>

  <p class="foot">PT. UNIFAM · Rank 1 = ekspedisi termurah untuk kota & tipe mobil itu</p>
</div>

<a href="https://nanodoang.github.io/Logistic-Transportation/" style="position:fixed;bottom:16px;left:16px;background:#fff;color:#0C447C;border:1px solid #BBD8F5;padding:10px 16px;border-radius:24px;font-size:13px;font-weight:700;text-decoration:none;box-shadow:0 2px 10px rgba(0,0,0,.15);z-index:999;display:flex;align-items:center;gap:6px">← Portal Utama</a>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbyMkAvd7tQGkFkXpo3sjbuNa2389lVRAP4YxuUnffFn0TtUjsKkQLli-fB0QC_MWOVJqQ/exec';
let DATA=[];
let JENIS='laut'; // 'laut' | 'darat'

function muat(){
  document.getElementById('isi').innerHTML='<div class="loading">Menghitung porsi ranking…</div>';
  const cb='cbRank'+Date.now();
  let selesai=false;
  const to=setTimeout(()=>{ if(!selesai){ selesai=true; document.getElementById('isi').innerHTML='<div class="empty">Koneksi lambat, coba Refresh lagi</div>'; } },25000);
  window[cb]=function(resp){
    if(selesai) return; selesai=true; clearTimeout(to);
    delete window[cb]; if(sc.parentNode) sc.parentNode.removeChild(sc);
    DATA=(resp&&resp.bulan)?resp.bulan:[];
    isiFilter(); render();
  };
  const sc=document.createElement('script');
  sc.src=GAS_URL+'?action=getrankstat&callback='+cb;
  sc.onerror=function(){ if(selesai) return; selesai=true; clearTimeout(to); delete window[cb]; document.getElementById('isi').innerHTML='<div class="empty">Gagal memuat data</div>'; };
  document.body.appendChild(sc);
}

function pilihJenis(j){
  JENIS=j;
  document.getElementById('t-laut').classList.toggle('on', j==='laut');
  document.getElementById('t-darat').classList.toggle('on', j==='darat');
  isiFilter(); render();
}
const NAMA_BLN=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function labelBulan(b){
  const p=String(b).split('-');
  if(p.length<2) return b;
  return NAMA_BLN[parseInt(p[1],10)-1]+' '+p[0];
}
function isiFilter(){
  const sel=document.getElementById('f-bulan');
  const kini=sel.value;
  sel.innerHTML='<option value="">— semua bulan —</option>'+
    DATA.map(d=>`<option value="${d.bulan}" ${kini===d.bulan?'selected':''}>${labelBulan(d.bulan)} (${(d[JENIS]||{}).terhitung||0})</option>`).join('');
}

function barisRank(no,jml,persen,cls){
  const medal=['🥇','🥈','🥉','4️⃣','➕'][no-1]||'';
  const nama=no<=4?('Rank '+no):'Rank 5+';
  return `<div class="rank-row">
    <div class="rank-lbl"><span>${medal}</span><span>${nama}</span></div>
    <div class="bar-wrap"><div class="bar ${cls}" style="width:${Math.max(persen,1.5)}%">${persen>=8?(persen+'%'):''}</div></div>
    <div class="rank-num"><b>${jml}</b>× <span class="mini">${persen<8?(persen+'%'):''}</span></div>
  </div>`;
}

function kartuBulan(row){
  const d=row[JENIS]||{r1:0,r2:0,r3:0,r4:0,lain:0,p1:0,p2:0,p3:0,p4:0,pLain:0,terhitung:0,tanpaRate:0};
  if(!d.terhitung && !d.tanpaRate) return '';
  return `<div class="card">
    <h2>${labelBulan(row.bulan)}</h2>
    <div class="sub">${d.terhitung} order terhitung${d.tanpaRate?(' · '+d.tanpaRate+' tanpa data rate'):''}</div>
    ${barisRank(1,d.r1,d.p1,'b1')}
    ${barisRank(2,d.r2,d.p2,'b2')}
    ${barisRank(3,d.r3,d.p3,'b3')}
    ${barisRank(4,d.r4,d.p4,'b4')}
    ${d.lain?barisRank(5,d.lain,d.pLain,'b5'):''}
  </div>`;
}

function render(){
  const f=document.getElementById('f-bulan').value;
  const list=f?DATA.filter(d=>d.bulan===f):DATA;
  const adaData = list.some(row=>{const d=row[JENIS]||{}; return (d.terhitung||0)>0 || (d.tanpaRate||0)>0;});
  if(!list.length || !adaData){
    document.getElementById('isi').innerHTML='<div class="empty">Belum ada data '+(JENIS==='laut'?'laut/kontainer':'darat/truck')+' untuk dihitung</div>';
    return;
  }
  // ringkasan total (semua bulan yang tampil)
  const T={r1:0,r2:0,r3:0,r4:0,lain:0,terhitung:0,tanpaRate:0};
  list.forEach(row=>{ const d=row[JENIS]||{}; T.r1+=d.r1||0;T.r2+=d.r2||0;T.r3+=d.r3||0;T.r4+=d.r4||0;T.lain+=d.lain||0;T.terhitung+=d.terhitung||0;T.tanpaRate+=d.tanpaRate||0; });
  const pct=n=>T.terhitung?Math.round(n*1000/T.terhitung)/10:0;

  let html=`<div class="stat-row">
    <div class="stat"><div class="l">Total Order</div><div class="n" style="color:var(--navy)">${T.terhitung}</div></div>
    <div class="stat"><div class="l">🥇 Rank 1</div><div class="n" style="color:var(--teal)">${pct(T.r1)}%</div></div>
    <div class="stat"><div class="l">🥈 Rank 2</div><div class="n" style="color:#3B82F6">${pct(T.r2)}%</div></div>
    <div class="stat"><div class="l">🥉 Rank 3</div><div class="n" style="color:var(--amber)">${pct(T.r3)}%</div></div>
    <div class="stat"><div class="l">4️⃣ Rank 4</div><div class="n" style="color:var(--purple)">${pct(T.r4)}%</div></div>
  </div>`;

  if(!f){
    html+=`<div class="card">
      <h2>${JENIS==='laut'?'🚢 Laut / Kontainer':'🚛 Darat / Truck'} — Total</h2>
      <div class="sub">${T.terhitung} order terhitung${T.tanpaRate?(' · '+T.tanpaRate+' tanpa data rate'):''}</div>
      ${barisRank(1,T.r1,pct(T.r1),'b1')}
      ${barisRank(2,T.r2,pct(T.r2),'b2')}
      ${barisRank(3,T.r3,pct(T.r3),'b3')}
      ${barisRank(4,T.r4,pct(T.r4),'b4')}
      ${T.lain?barisRank(5,T.lain,pct(T.lain),'b5'):''}
    </div>`;
  }

  html+=list.map(kartuBulan).join('');

  // tabel ringkas per bulan
  if(list.length>1){
    html+=`<div class="card">
      <h2>Ringkasan per Bulan</h2>
      <div class="sub">Jumlah order & persentase tiap ranking</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Bulan</th><th>Total</th><th>🥇 R1</th><th>🥈 R2</th><th>🥉 R3</th><th>4️⃣ R4</th><th>5+</th></tr></thead>
        <tbody>${list.map(row=>{const d=row[JENIS]||{};return `<tr>
          <td style="font-weight:700">${labelBulan(row.bulan)}</td>
          <td>${d.terhitung||0}</td>
          <td style="color:var(--teal);font-weight:700">${d.r1||0}× <span class="mini">${d.p1||0}%</span></td>
          <td style="color:#3B82F6;font-weight:700">${d.r2||0}× <span class="mini">${d.p2||0}%</span></td>
          <td style="color:var(--amber);font-weight:700">${d.r3||0}× <span class="mini">${d.p3||0}%</span></td>
          <td style="color:var(--purple);font-weight:700">${d.r4||0}× <span class="mini">${d.p4||0}%</span></td>
          <td class="mini">${d.lain||0}× ${d.pLain||0}%</td>
        </tr>`}).join('')}</tbody>
      </table></div>
    </div>`;
  }

  html+=`<div class="note">💡 <b>Rank 1</b> = ekspedisi termurah untuk kota & tipe itu. Data dipisah: <b>Laut</b> (20 FT / 20 FT C / 40 FT) dan <b>Darat</b> (FUSO, CD, TRONTON, WINGBOX). Makin besar porsi Rank 1, makin hemat.</div>`;

  document.getElementById('isi').innerHTML=html;
}

muat();
</script>
</body>
</html>
